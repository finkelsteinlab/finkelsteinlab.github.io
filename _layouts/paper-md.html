---
layout: default
---

<div class="bigspacer"></div>

<div class="row">
	<div class="col-md-9">
		<div class="media-body titlebox">
			<div class="title media-heading">
				{{ page.title }}
			</div>
			<p>
			<div class="smallhead">
				<a class="off" href="/papers/{{ page.source_paper }}">&larr; Back to paper page</a>
			</div>
		</div>
	</div>
</div>

<div class="bigspacer"></div>

<div class="row">
	<div class="col-md-10 col-md-offset-1">
		<div class="post paper-fulltext">
			{{ content }}
		</div>
	</div>
</div>

<div class="bigspacer"></div>

<script>
// Wrap figure images + captions in styled <figure> boxes
(function() {
  var figRe = /^(Figure\s+\d|Fig[\.\s]+\d)/;
  var imgs = document.querySelectorAll('.paper-fulltext p > img[alt^="Figure"], .paper-fulltext p > img[alt^="Fig."], .paper-fulltext p > img[alt^="Fig "]');
  for (var i = 0; i < imgs.length; i++) {
    var imgP = imgs[i].parentElement;
    if (imgP.closest('.paper-figure')) continue; // already wrapped
    var prev = imgP.previousElementSibling;
    var figure = document.createElement('figure');
    figure.className = 'paper-figure';

    // Insert figure before the image paragraph, then move image in
    imgP.parentNode.insertBefore(figure, imgP);
    figure.appendChild(imgP);
    // Unwrap the <p> so img is direct child of figure
    while (imgP.firstChild) figure.insertBefore(imgP.firstChild, imgP);
    figure.removeChild(imgP);

    // Check preceding element for caption (could be <p>, <h3>, <h4>, etc.)
    if (prev) {
      var tag = prev.tagName;
      var text = prev.textContent || '';
      if ((tag === 'P' || tag === 'H3' || tag === 'H4' || tag === 'H5') && figRe.test(text)) {
        var cap = document.createElement('figcaption');
        while (prev.firstChild) cap.appendChild(prev.firstChild);
        figure.appendChild(cap);
        prev.parentNode.removeChild(prev);
      }
    }

    // Also capture sub-panel descriptions that follow the image
    // (paragraphs starting with bold panel labels like **(A)** or **a**)
    var next = figure.nextElementSibling;
    if (next && next.tagName === 'P') {
      var nextText = next.textContent || '';
      if (/^\*?\*?\(?[a-hA-H]\)?[\.\s\*]/.test(nextText) || /^\(\s*[a-hA-H]\s*\)/.test(nextText)) {
        // This is a panel description paragraph — add to figcaption
        var existingCap = figure.querySelector('figcaption');
        if (existingCap) {
          existingCap.appendChild(document.createElement('br'));
          while (next.firstChild) existingCap.appendChild(next.firstChild);
          next.parentNode.removeChild(next);
        }
      }
    }
  }
})();
</script>
