---
layout: default
---

<div class="bigspacer"></div>

<div class="row">
	<div class="col-md-9">
		<div class="media-body titlebox">
			<div class="title media-heading">
				{{ page.title }}
			</div>
			<p>
			<div class="smallhead">
				<a class="off" href="/papers/{{ page.source_paper }}">&larr; Back to paper page</a>
			</div>
		</div>
	</div>
</div>

<div class="bigspacer"></div>

<div class="row">
	<div class="col-md-10 col-md-offset-1">
		<div class="post paper-fulltext">
			{{ content }}
		</div>
	</div>
</div>

<div class="bigspacer"></div>

<script>
// Wrap figure images + captions in styled <figure> boxes
(function() {
  var figRe = /^(Figure\s+\d|Fig[\.\s]+\d)/;
  var sel = '.paper-fulltext img[alt^="Figure"], .paper-fulltext img[alt^="Fig."], .paper-fulltext img[alt^="Fig "]';
  var imgs = document.querySelectorAll(sel);

  for (var i = 0; i < imgs.length; i++) {
    var img = imgs[i];
    if (img.closest('.paper-figure')) continue;
    var parent = img.parentElement;
    var figure = document.createElement('figure');
    figure.className = 'paper-figure';

    // Case 1: img is inside a <p> that also contains caption text (same paragraph)
    if (parent.tagName === 'P' && figRe.test(parent.textContent)) {
      // Extract the image from the paragraph
      parent.parentNode.insertBefore(figure, parent);
      figure.appendChild(img);
      // Remaining content in the <p> is the caption
      if (parent.textContent.trim()) {
        var cap = document.createElement('figcaption');
        while (parent.firstChild) cap.appendChild(parent.firstChild);
        figure.appendChild(cap);
        parent.parentNode.removeChild(parent);
      }
    }
    // Case 2: img is in its own <p>, caption is a preceding element
    else if (parent.tagName === 'P') {
      var prev = parent.previousElementSibling;
      parent.parentNode.insertBefore(figure, parent);
      // Move image out of <p> wrapper
      figure.appendChild(img);
      if (!parent.textContent.trim()) parent.parentNode.removeChild(parent);

      // Check preceding element for caption
      if (prev) {
        var tag = prev.tagName;
        var text = prev.textContent || '';
        if ((tag === 'P' || tag === 'H3' || tag === 'H4' || tag === 'H5') && figRe.test(text)) {
          var cap = document.createElement('figcaption');
          while (prev.firstChild) cap.appendChild(prev.firstChild);
          figure.appendChild(cap);
          prev.parentNode.removeChild(prev);
        }
      }
    }
  }
})();
</script>
