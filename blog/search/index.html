---
layout: default
title: Search Blog
description: Search blog posts
---
{% include JB/setup %}

<div class="page-header">
  <h1>Search Blog</h1>
</div>

<div class="row">
  <div class="col-md-8 col-md-offset-2">
    <div class="input-group input-group-lg">
      <input type="text" id="search-input" class="form-control" placeholder="Search posts..." autofocus>
      <span class="input-group-btn">
        <button class="btn btn-primary" type="button" id="search-btn">
          <i class="fas fa-search"></i> Search
        </button>
      </span>
    </div>
    
    <div id="search-results" style="margin-top: 2em;">
      <p class="text-muted">Enter a search term above...</p>
    </div>
  </div>
</div>

<!-- Lunr.js -->
<script src="https://unpkg.com/lunr/lunr.js"></script>
<script>
(function() {
  var searchIndex = null;
  var documents = null;
  
  // Load the search index
  fetch('/blog/search.json')
    .then(response => response.json())
    .then(data => {
      documents = data;
      searchIndex = lunr(function() {
        this.ref('url');
        this.field('title', { boost: 10 });
        this.field('tags', { boost: 5 });
        this.field('excerpt', { boost: 2 });
        this.field('content');
        
        data.forEach(doc => {
          this.add({
            url: doc.url,
            title: doc.title,
            tags: doc.tags ? doc.tags.join(' ') : '',
            excerpt: doc.excerpt,
            content: doc.content
          });
        });
      });
    });
  
  function search(query) {
    if (!searchIndex || !query.trim()) {
      return [];
    }
    
    try {
      var results = searchIndex.search(query);
      return results.map(result => {
        var doc = documents.find(d => d.url === result.ref);
        return { ...doc, score: result.score };
      });
    } catch (e) {
      // Handle Lunr syntax errors gracefully
      return [];
    }
  }
  
  function displayResults(results, query) {
    var container = document.getElementById('search-results');
    
    if (results.length === 0) {
      container.innerHTML = '<p class="text-muted">No results found for "' + query + '"</p>';
      return;
    }
    
    var html = '<p class="text-muted">' + results.length + ' result(s) for "' + query + '"</p>';
    
    results.forEach(result => {
      html += '<article class="blog-listing" style="margin-bottom: 1.5em;">';
      html += '<h3><a href="' + result.url + '">' + result.title + '</a></h3>';
      html += '<p class="text-muted"><i class="far fa-calendar-alt"></i> ' + result.date + '</p>';
      if (result.excerpt) {
        html += '<p>' + result.excerpt + '</p>';
      }
      if (result.tags && result.tags.length > 0) {
        html += '<p>';
        result.tags.forEach(tag => {
          html += '<a href="/blog/tags/#' + tag.toLowerCase().replace(/\s+/g, '-') + '" class="label label-info">' + tag + '</a> ';
        });
        html += '</p>';
      }
      html += '</article><hr>';
    });
    
    container.innerHTML = html;
  }
  
  function doSearch() {
    var query = document.getElementById('search-input').value;
    var results = search(query);
    displayResults(results, query);
  }
  
  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('search-input').addEventListener('keyup', function(e) {
    if (e.key === 'Enter') {
      doSearch();
    }
    // Live search after 2+ characters
    if (this.value.length >= 2) {
      doSearch();
    }
  });
  
  // Check for query parameter
  var urlParams = new URLSearchParams(window.location.search);
  var q = urlParams.get('q');
  if (q) {
    document.getElementById('search-input').value = q;
    // Wait for index to load then search
    setTimeout(doSearch, 500);
  }
})();
</script>
