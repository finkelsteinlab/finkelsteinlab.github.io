<!-- Giscus Comments -->
<!-- 
  To enable comments:
  1. Enable Discussions on the GitHub repo (Settings → Features → Discussions)
  2. Install giscus app: https://github.com/apps/giscus
  3. Create a "Blog Comments" category in Discussions (Announcement type recommended)
  4. Update data-repo, data-repo-id, data-category, data-category-id below
     Get these values from: https://giscus.app/
-->
<script src="https://giscus.app/client.js"
        data-repo="finkelsteinlab/finkelsteinlab.github.io"
        data-repo-id=""
        data-category="Blog Comments"
        data-category-id=""
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="light"
        data-lang="en"
        data-loading="lazy"
        crossorigin="anonymous"
        async>
</script>
<noscript>Please enable JavaScript to view comments.</noscript>
